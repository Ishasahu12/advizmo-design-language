<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800">
  <defs>
    <style>
      .label { font-family: Inter, -apple-system, sans-serif; font-size: 11px; fill: #6B7280; font-weight: 500; letter-spacing: 0.05em; }
      .label-dark { font-family: Inter, -apple-system, sans-serif; font-size: 11px; fill: #9CA3AF; font-weight: 500; letter-spacing: 0.05em; }
      .btn-text { font-family: Inter, -apple-system, sans-serif; font-size: 15px; font-weight: 600; }
      .btn-text-s { font-family: Inter, -apple-system, sans-serif; font-size: 13px; font-weight: 600; }
      .btn-text-l { font-family: Inter, -apple-system, sans-serif; font-size: 17px; font-weight: 600; }
      .section-title { font-family: Inter, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #111827; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="1800" fill="#F9FAFB"/>
  
  <!-- Section: PRIMARY -->
  <text x="40" y="40" class="section-title">PRIMARY BUTTON</text>
  
  <!-- Primary / Large / Default -->
  <text x="40" y="80" class="label">L / DEFAULT</text>
  <rect x="40" y="90" width="160" height="48" rx="8" fill="#2563EB"/>
  <text x="120" y="119" class="btn-text-l" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Large / Hover -->
  <text x="240" y="80" class="label">L / HOVER</text>
  <rect x="240" y="90" width="160" height="48" rx="8" fill="#1D4ED8"/>
  <text x="320" y="119" class="btn-text-l" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Large / Pressed -->
  <text x="440" y="80" class="label">L / PRESSED</text>
  <rect x="440" y="90" width="160" height="48" rx="8" fill="#1E40AF"/>
  <text x="520" y="119" class="btn-text-l" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Large / Disabled -->
  <text x="640" y="80" class="label">L / DISABLED</text>
  <rect x="640" y="90" width="160" height="48" rx="8" fill="#E5E7EB"/>
  <text x="720" y="119" class="btn-text-l" fill="#9CA3AF" text-anchor="middle">Button</text>
  
  <!-- Primary / Large / Loading -->
  <text x="840" y="80" class="label">L / LOADING</text>
  <rect x="840" y="90" width="160" height="48" rx="8" fill="#2563EB" opacity="0.7"/>
  <circle cx="890" cy="114" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="20 12"/>
  <text x="920" y="119" class="btn-text-l" fill="#FFFFFF" text-anchor="start">Loading</text>
  
  <!-- Primary / Medium / Default -->
  <text x="40" y="170" class="label">M / DEFAULT</text>
  <rect x="40" y="180" width="140" height="40" rx="8" fill="#2563EB"/>
  <text x="110" y="205" class="btn-text" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Medium / Hover -->
  <text x="240" y="170" class="label">M / HOVER</text>
  <rect x="240" y="180" width="140" height="40" rx="8" fill="#1D4ED8"/>
  <text x="310" y="205" class="btn-text" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Medium / Pressed -->
  <text x="440" y="170" class="label">M / PRESSED</text>
  <rect x="440" y="180" width="140" height="40" rx="8" fill="#1E40AF"/>
  <text x="510" y="205" class="btn-text" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Medium / Disabled -->
  <text x="640" y="170" class="label">M / DISABLED</text>
  <rect x="640" y="180" width="140" height="40" rx="8" fill="#E5E7EB"/>
  <text x="710" y="205" class="btn-text" fill="#9CA3AF" text-anchor="middle">Button</text>
  
  <!-- Primary / Small / Default -->
  <text x="40" y="250" class="label">S / DEFAULT</text>
  <rect x="40" y="260" width="120" height="32" rx="8" fill="#2563EB"/>
  <text x="100" y="281" class="btn-text-s" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Small / Hover -->
  <text x="240" y="250" class="label">S / HOVER</text>
  <rect x="240" y="260" width="120" height="32" rx="8" fill="#1D4ED8"/>
  <text x="300" y="281" class="btn-text-s" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Primary / Small / Disabled -->
  <text x="440" y="250" class="label">S / DISABLED</text>
  <rect x="440" y="260" width="120" height="32" rx="8" fill="#E5E7EB"/>
  <text x="500" y="281" class="btn-text-s" fill="#9CA3AF" text-anchor="middle">Button</text>
  
  <!-- Section: SECONDARY -->
  <text x="40" y="340" class="section-title">SECONDARY BUTTON</text>
  
  <!-- Secondary / Large / Default -->
  <text x="40" y="380" class="label">L / DEFAULT</text>
  <rect x="40" y="390" width="160" height="48" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="120" y="419" class="btn-text-l" fill="#111827" text-anchor="middle">Button</text>
  
  <!-- Secondary / Large / Hover -->
  <text x="240" y="380" class="label">L / HOVER</text>
  <rect x="240" y="390" width="160" height="48" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="320" y="419" class="btn-text-l" fill="#111827" text-anchor="middle">Button</text>
  
  <!-- Secondary / Large / Pressed -->
  <text x="440" y="380" class="label">L / PRESSED</text>
  <rect x="440" y="390" width="160" height="48" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="520" y="419" class="btn-text-l" fill="#111827" text-anchor="middle">Button</text>
  
  <!-- Secondary / Large / Disabled -->
  <text x="640" y="380" class="label">L / DISABLED</text>
  <rect x="640" y="390" width="160" height="48" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="720" y="419" class="btn-text-l" fill="#9CA3AF" text-anchor="middle">Button</text>
  
  <!-- Secondary / Medium / Default -->
  <text x="40" y="470" class="label">M / DEFAULT</text>
  <rect x="40" y="480" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="110" y="505" class="btn-text" fill="#111827" text-anchor="middle">Button</text>
  
  <!-- Secondary / Medium / Hover -->
  <text x="240" y="470" class="label">M / HOVER</text>
  <rect x="240" y="480" width="140" height="40" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="310" y="505" class="btn-text" fill="#111827" text-anchor="middle">Button</text>
  
  <!-- Secondary / Small / Default -->
  <text x="40" y="550" class="label">S / DEFAULT</text>
  <rect x="40" y="560" width="120" height="32" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="100" y="581" class="btn-text-s" fill="#111827" text-anchor="middle">Button</text>
  
  <!-- Section: GHOST -->
  <text x="40" y="630" class="section-title">GHOST BUTTON</text>
  
  <!-- Ghost / Large / Default -->
  <text x="40" y="670" class="label">L / DEFAULT</text>
  <rect x="40" y="680" width="160" height="48" rx="8" fill="transparent"/>
  <text x="120" y="709" class="btn-text-l" fill="#2563EB" text-anchor="middle">Button</text>
  
  <!-- Ghost / Large / Hover -->
  <text x="240" y="670" class="label">L / HOVER</text>
  <rect x="240" y="680" width="160" height="48" rx="8" fill="#EFF6FF"/>
  <text x="320" y="709" class="btn-text-l" fill="#2563EB" text-anchor="middle">Button</text>
  
  <!-- Ghost / Large / Pressed -->
  <text x="440" y="670" class="label">L / PRESSED</text>
  <rect x="440" y="680" width="160" height="48" rx="8" fill="#DBEAFE"/>
  <text x="520" y="709" class="btn-text-l" fill="#1D4ED8" text-anchor="middle">Button</text>
  
  <!-- Ghost / Medium / Default -->
  <text x="40" y="760" class="label">M / DEFAULT</text>
  <rect x="40" y="770" width="140" height="40" rx="8" fill="transparent"/>
  <text x="110" y="795" class="btn-text" fill="#2563EB" text-anchor="middle">Button</text>
  
  <!-- Ghost / Small / Default -->
  <text x="40" y="840" class="label">S / DEFAULT</text>
  <rect x="40" y="850" width="120" height="32" rx="8" fill="transparent"/>
  <text x="100" y="871" class="btn-text-s" fill="#2563EB" text-anchor="middle">Button</text>
  
  <!-- Section: DESTRUCTIVE -->
  <text x="40" y="920" class="section-title">DESTRUCTIVE BUTTON</text>
  
  <!-- Destructive / Large / Default -->
  <text x="40" y="960" class="label">L / DEFAULT</text>
  <rect x="40" y="970" width="160" height="48" rx="8" fill="#DC2626"/>
  <text x="120" y="999" class="btn-text-l" fill="#FFFFFF" text-anchor="middle">Delete</text>
  
  <!-- Destructive / Large / Hover -->
  <text x="240" y="960" class="label">L / HOVER</text>
  <rect x="240" y="970" width="160" height="48" rx="8" fill="#B91C1C"/>
  <text x="320" y="999" class="btn-text-l" fill="#FFFFFF" text-anchor="middle">Delete</text>
  
  <!-- Destructive / Large / Pressed -->
  <text x="440" y="960" class="label">L / PRESSED</text>
  <rect x="440" y="970" width="160" height="48" rx="8" fill="#991B1B"/>
  <text x="520" y="999" class="btn-text-l" fill="#FFFFFF" text-anchor="middle">Delete</text>
  
  <!-- Destructive / Medium / Default -->
  <text x="40" y="1050" class="label">M / DEFAULT</text>
  <rect x="40" y="1060" width="140" height="40" rx="8" fill="#DC2626"/>
  <text x="110" y="1085" class="btn-text" fill="#FFFFFF" text-anchor="middle">Delete</text>
  
  <!-- Section: ICON BUTTONS -->
  <text x="40" y="1140" class="section-title">ICON BUTTONS</text>
  
  <!-- Icon Primary / Large -->
  <text x="40" y="1180" class="label">ICON / PRIMARY / L</text>
  <rect x="40" y="1190" width="48" height="48" rx="8" fill="#2563EB"/>
  <path d="M60 1214 L68 1206 M68 1206 L76 1214 M68 1206 V1222" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Icon Secondary / Large -->
  <text x="120" y="1180" class="label">ICON / SECONDARY / L</text>
  <rect x="120" y="1190" width="48" height="48" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <path d="M140 1214 L148 1206 M148 1206 L156 1214 M148 1206 V1222" stroke="#111827" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Icon Ghost / Large -->
  <text x="200" y="1180" class="label">ICON / GHOST / L</text>
  <rect x="200" y="1190" width="48" height="48" rx="8" fill="transparent"/>
  <path d="M220 1214 L228 1206 M228 1206 L236 1214 M228 1206 V1222" stroke="#2563EB" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Icon Primary / Medium -->
  <text x="280" y="1180" class="label">ICON / PRIMARY / M</text>
  <rect x="280" y="1194" width="40" height="40" rx="8" fill="#2563EB"/>
  <path d="M297 1214 L303 1208 M303 1208 L309 1214 M303 1208 V1222" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Icon Primary / Small -->
  <text x="360" y="1180" class="label">ICON / PRIMARY / S</text>
  <rect x="360" y="1198" width="32" height="32" rx="8" fill="#2563EB"/>
  <path d="M374 1214 L378 1210 M378 1210 L382 1214 M378 1210 V1220" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Section: BUTTONS WITH ICONS -->
  <text x="40" y="1270" class="section-title">BUTTONS WITH LEADING ICON</text>
  
  <!-- Primary with icon -->
  <text x="40" y="1310" class="label">PRIMARY + ICON</text>
  <rect x="40" y="1320" width="180" height="48" rx="8" fill="#2563EB"/>
  <path d="M68 1344 L76 1336 M76 1336 L84 1344 M76 1336 V1352" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="102" y="1349" class="btn-text" fill="#FFFFFF" text-anchor="start">Add Item</text>
  
  <!-- Secondary with icon -->
  <text x="260" y="1310" class="label">SECONDARY + ICON</text>
  <rect x="260" y="1320" width="180" height="48" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <path d="M288 1344 L296 1336 M296 1336 L304 1344 M296 1336 V1352" stroke="#111827" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="314" y="1349" class="btn-text" fill="#111827" text-anchor="start">Add Item</text>
  
  <!-- Section: PILL BUTTONS -->
  <text x="40" y="1400" class="section-title">PILL BUTTONS</text>
  
  <!-- Pill Primary -->
  <text x="40" y="1440" class="label">PILL / PRIMARY</text>
  <rect x="40" y="1450" width="140" height="40" rx="9999" fill="#2563EB"/>
  <text x="110" y="1475" class="btn-text" fill="#FFFFFF" text-anchor="middle">Invest Now</text>
  
  <!-- Pill Secondary -->
  <text x="220" y="1440" class="label">PILL / SECONDARY</text>
  <rect x="220" y="1450" width="140" height="40" rx="9999" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="290" y="1475" class="btn-text" fill="#111827" text-anchor="middle">View Details</text>
  
  <!-- Pill Ghost -->
  <text x="400" y="1440" class="label">PILL / GHOST</text>
  <rect x="400" y="1450" width="140" height="40" rx="9999" fill="transparent"/>
  <text x="470" y="1475" class="btn-text" fill="#2563EB" text-anchor="middle">Learn More</text>
  
  <!-- Section: FULL WIDTH -->
  <text x="40" y="1530" class="section-title">FULL WIDTH BUTTONS</text>
  
  <!-- Full Width Primary -->
  <text x="40" y="1570" class="label">FULL WIDTH / PRIMARY</text>
  <rect x="40" y="1580" width="480" height="48" rx="8" fill="#2563EB"/>
  <text x="280" y="1609" class="btn-text" fill="#FFFFFF" text-anchor="middle">Continue to Payment</text>
  
  <!-- Full Width Secondary -->
  <text x="40" y="1640" class="label">FULL WIDTH / SECONDARY</text>
  <rect x="40" y="1650" width="480" height="48" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="280" y="1679" class="btn-text" fill="#111827" text-anchor="middle">View All Transactions</text>
  
  <!-- Section: ANATOMY -->
  <text x="600" y="340" class="section-title">COMPONENT ANATOMY</text>
  
  <!-- Anatomy diagram -->
  <rect x="600" y="390" width="200" height="48" rx="8" fill="#2563EB"/>
  <text x="700" y="419" class="btn-text" fill="#FFFFFF" text-anchor="middle">Button</text>
  
  <!-- Labels -->
  <line x1="600" y1="380" x2="600" y2="370" stroke="#6B7280" stroke-width="1" stroke-dasharray="2"/>
  <text x="600" y="365" class="label" text-anchor="middle">← Radius: 8px</text>
  
  <line x1="800" y1="414" x2="830" y2="414" stroke="#6B7280" stroke-width="1" stroke-dasharray="2"/>
  <text x="860" y="418" class="label">Height: 48px (L)</text>
  <text x="860" y="432" class="label">40px (M) / 32px (S)</text>
  
  <line x1="700" y1="438" x2="700" y2="460" stroke="#6B7280" stroke-width="1" stroke-dasharray="2"/>
  <text x="700" y="475" class="label" text-anchor="middle">← Padding: 16px H / 8px V</text>
  
  <!-- Min Touch Target -->
  <rect x="600" y="500" width="200" height="48" rx="8" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4"/>
  <text x="700" y="530" class="label" text-anchor="middle" fill="#3B82F6">Min Touch: 44×44pt</text>
  
  <!-- Typography Specs -->
  <text x="600" y="600" class="section-title">TYPOGRAPHY SPECS</text>
  <text x="600" y="630" class="label">L: Inter 17px / 600 / 22px line</text>
  <text x="600" y="650" class="label">M: Inter 15px / 600 / 20px line</text>
  <text x="600" y="670" class="label">S: Inter 13px / 600 / 18px line</text>
  
  <!-- Spacing -->
  <text x="600" y="720" class="section-title">SPACING</text>
  <text x="600" y="750" class="label">Padding H: 16px (L) / 12px (M,S)</text>
  <text x="600" y="770" class="label">Padding V: 12px (L) / 10px (M) / 6px (S)</text>
  <text x="600" y="790" class="label">Gap (icon + text): 8px</text>
  
  <!-- Rules -->
  <text x="600" y="840" class="section-title">RULES</text>
  <text x="600" y="870" class="label">• One primary action per screen</text>
  <text x="600" y="890" class="label">• Primary for main action, Secondary for secondary</text>
  <text x="600" y="910" class="label">• Ghost for inline/link actions</text>
  <text x="600" y="930" class="label">• Destructive requires confirmation</text>
  <text x="600" y="950" class="label">• Never disable without reason</text>
  <text x="600" y="970" class="label">• Min 44pt touch target</text>
  <text x="600" y="990" class="label">• Loading state replaces text with spinner</text>
  <text x="600" y="1010" class="label">• Icon size: 20px (M,L) / 16px (S)</text>
  
  <!-- Dark Mode Preview -->
  <text x="600" y="1070" class="section-title">DARK MODE</text>
  <rect x="600" y="1090" width="200" height="300" rx="12" fill="#030712"/>
  
  <!-- Dark Primary -->
  <rect x="620" y="1110" width="160" height="40" rx="8" fill="#3B82F6"/>
  <text x="700" y="1135" class="btn-text" fill="#FFFFFF" text-anchor="middle">Primary</text>
  
  <!-- Dark Secondary -->
  <rect x="620" y="1160" width="160" height="40" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="700" y="1185" class="btn-text" fill="#F9FAFB" text-anchor="middle">Secondary</text>
  
  <!-- Dark Ghost -->
  <rect x="620" y="1210" width="160" height="40" rx="8" fill="transparent"/>
  <text x="700" y="1235" class="btn-text" fill="#60A5FA" text-anchor="middle">Ghost</text>
  
  <!-- Dark Destructive -->
  <rect x="620" y="1260" width="160" height="40" rx="8" fill="#EF4444"/>
  <text x="700" y="1285" class="btn-text" fill="#FFFFFF" text-anchor="middle">Destructive</text>
  
  <!-- Dark Disabled -->
  <rect x="620" y="1310" width="160" height="40" rx="8" fill="#1F2937"/>
  <text x="700" y="1335" class="btn-text" fill="#4B5563" text-anchor="middle">Disabled</text>
  
  <!-- Token References -->
  <text x="600" y="1430" class="section-title">TOKEN REFERENCES</text>
  <text x="600" y="1460" class="label">bg: action.primary → blue.600</text>
  <text x="600" y="1480" class="label">bg-hover: action.primary-hover → blue.700</text>
  <text x="600" y="1500" class="label">bg-pressed: action.primary-pressed → blue.800</text>
  <text x="600" y="1520" class="label">text: action.primary-on → white</text>
  <text x="600" y="1540" class="label">border: transparent</text>
  <text x="600" y="1560" class="label">radius: radius.sm → 8px</text>
  <text x="600" y="1580" class="label">padding: spacing.4 / spacing.2</text>
  
  <!-- Accessibility -->
  <text x="600" y="1630" class="section-title">ACCESSIBILITY</text>
  <text x="600" y="1660" class="label">• WCAG AA contrast on all states</text>
  <text x="600" y="1680" class="label">• Focus ring: 2px blue.500, offset 2px</text>
  <text x="600" y="1700" class="label">• Disabled: opacity 0.4</text>
  <text x="600" y="1720" class="label">• VoiceOver: descriptive label</text>
  <text x="600" y="1740" class="label">• Loading: aria-busy="true"</text>
</svg>
