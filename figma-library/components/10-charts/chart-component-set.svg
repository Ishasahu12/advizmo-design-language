<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <style>
      .label { font-family: Inter, -apple-system, sans-serif; font-size: 11px; fill: #6B7280; font-weight: 500; letter-spacing: 0.05em; }
      .section-title { font-family: Inter, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #111827; }
      .axis-label { font-family: Inter, sans-serif; font-size: 11px; fill: #9CA3AF; }
    </style>
  </defs>
  
  <rect width="1200" height="1200" fill="#F9FAFB"/>
  
  <!-- Section: LINE CHART -->
  <text x="40" y="40" class="section-title">LINE CHART</text>
  
  <rect x="40" y="60" width="360" height="240" rx="12" fill="#FFFFFF" filter="url(#chart-shadow)"/>
  <!-- Grid -->
  <line x1="80" y1="100" x2="80" y2="260" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="80" y1="260" x2="360" y2="260" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="80" y1="220" x2="360" y2="220" stroke="#F3F4F6" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="180" x2="360" y2="180" stroke="#F3F4F6" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="140" x2="360" y2="140" stroke="#F3F4F6" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="100" x2="360" y2="100" stroke="#F3F4F6" stroke-width="0.5" stroke-dasharray="4"/>
  <!-- Axis labels -->
  <text x="72" y="264" class="axis-label" text-anchor="end">$0</text>
  <text x="72" y="224" class="axis-label" text-anchor="end">25k</text>
  <text x="72" y="184" class="axis-label" text-anchor="end">50k</text>
  <text x="72" y="144" class="axis-label" text-anchor="end">75k</text>
  <text x="72" y="104" class="axis-label" text-anchor="end">100k</text>
  <!-- Line -->
  <polyline points="80,240 120,230 160,210 200,215 240,190 280,170 320,150 360,130" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="360" cy="130" r="4" fill="#3B82F6"/>
  <circle cx="360" cy="130" r="8" fill="#3B82F6" opacity="0.2"/>
  
  <!-- Area Chart -->
  <text x="460" y="40" class="section-title">AREA CHART</text>
  <rect x="460" y="60" width="360" height="240" rx="12" fill="#FFFFFF" filter="url(#chart-shadow)"/>
  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <path d="M500,260 L540,250 L580,230 L620,235 L660,210 L700,190 L740,170 L780,150 L780,260 Z" fill="url(#areaGrad)"/>
  <polyline points="500,260 540,250 580,230 620,235 660,210 700,190 740,170 780,150" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="780" cy="150" r="4" fill="#3B82F6"/>
  
  <!-- Section: BAR CHART -->
  <text x="40" y="340" class="section-title">BAR CHART</text>
  <rect x="40" y="360" width="360" height="200" rx="12" fill="#FFFFFF" filter="url(#chart-shadow)"/>
  <line x1="80" y1="520" x2="360" y2="520" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="100" y="440" width="24" height="80" rx="4" fill="#3B82F6"/>
  <rect x="140" y="420" width="24" height="100" rx="4" fill="#3B82F6"/>
  <rect x="180" y="460" width="24" height="60" rx="4" fill="#3B82F6"/>
  <rect x="220" y="400" width="24" height="120" rx="4" fill="#3B82F6"/>
  <rect x="260" y="380" width="24" height="140" rx="4" fill="#3B82F6"/>
  <rect x="300" y="430" width="24" height="90" rx="4" fill="#3B82F6"/>
  <text x="112" y="536" class="axis-label" text-anchor="middle">Jan</text>
  <text x="152" y="536" class="axis-label" text-anchor="middle">Feb</text>
  <text x="192" y="536" class="axis-label" text-anchor="middle">Mar</text>
  <text x="232" y="536" class="axis-label" text-anchor="middle">Apr</text>
  <text x="272" y="536" class="axis-label" text-anchor="middle">May</text>
  <text x="312" y="536" class="axis-label" text-anchor="middle">Jun</text>
  
  <!-- Stacked Bar -->
  <text x="460" y="340" class="section-title">STACKED BAR</text>
  <rect x="460" y="360" width="360" height="200" rx="12" fill="#FFFFFF" filter="url(#chart-shadow)"/>
  <line x1="500" y1="520" x2="780" y2="520" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="520" y="420" width="24" height="100" rx="4" fill="#10B981"/>
  <rect x="520" y="460" width="24" height="60" rx="4" fill="#3B82F6"/>
  <rect x="520" y="490" width="24" height="30" rx="4" fill="#F97316"/>
  <rect x="560" y="400" width="24" height="120" rx="4" fill="#10B981"/>
  <rect x="560" y="440" width="24" height="80" rx="4" fill="#3B82F6"/>
  <rect x="560" y="480" width="24" height="40" rx="4" fill="#F97316"/>
  <rect x="600" y="440" width="24" height="80" rx="4" fill="#10B981"/>
  <rect x="600" y="470" width="24" height="50" rx="4" fill="#3B82F6"/>
  <rect x="600" y="500" width="24" height="20" rx="4" fill="#F97316"/>
  
  <!-- Section: DONUT -->
  <text x="40" y="600" class="section-title">DONUT CHART</text>
  <rect x="40" y="620" width="200" height="200" rx="12" fill="#FFFFFF" filter="url(#chart-shadow)"/>
  <circle cx="140" cy="720" r="60" fill="none" stroke="#E5E7EB" stroke-width="20"/>
  <circle cx="140" cy="720" r="60" fill="none" stroke="#3B82F6" stroke-width="20" stroke-dasharray="188.5 188.5" stroke-dashoffset="94.2" transform="rotate(-90 140 720)"/>
  <circle cx="140" cy="720" r="60" fill="none" stroke="#10B981" stroke-width="20" stroke-dasharray="94.2 282.7" stroke-dashoffset="-94.2" transform="rotate(-90 140 720)"/>
  <circle cx="140" cy="720" r="60" fill="none" stroke="#F97316" stroke-width="20" stroke-dasharray="56.5 320.4" stroke-dashoffset="-188.5" transform="rotate(-90 140 720)"/>
  <text x="140" y="716" font-family="IBM Plex Sans, sans-serif" font-size="18px" font-weight="600" fill="#111827" text-anchor="middle">$85k</text>
  <text x="140" y="734" font-family="Inter, sans-serif" font-size="11px" fill="#6B7280" text-anchor="middle">Total</text>
  
  <!-- Legend -->
  <text x="280" y="660" class="label">ALLOCATION</text>
  <circle cx="280" cy="680" r="4" fill="#3B82F6"/>
  <text x="292" y="684" class="label">Stocks 50%</text>
  <circle cx="280" cy="700" r="4" fill="#10B981"/>
  <text x="292" y="704" class="label">Bonds 25%</text>
  <circle cx="280" cy="720" r="4" fill="#F97316"/>
  <text x="292" y="724" class="label">Crypto 15%</text>
  <circle cx="280" cy="740" r="4" fill="#E5E7EB"/>
  <text x="292" y="744" class="label">Cash 10%</text>
  
  <!-- Section: SPARKLINE -->
  <text x="40" y="860" class="section-title">SPARKLINE</text>
  
  <rect x="40" y="880" width="160" height="48" rx="8" fill="#FFFFFF"/>
  <text x="56" y="900" class="label">AAPL</text>
  <text x="56" y="918" font-family="IBM Plex Sans, sans-serif" font-size="13px" font-weight="500" fill="#059669">$185.40 +2.4%</text>
  <polyline points="160,910 170,905 180,908 190,900 200,895 210,890" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  
  <rect x="240" y="880" width="160" height="48" rx="8" fill="#FFFFFF"/>
  <text x="256" y="900" class="label">TSLA</text>
  <text x="256" y="918" font-family="IBM Plex Sans, sans-serif" font-size="13px" font-weight="500" fill="#DC2626">$240.10 -1.2%</text>
  <polyline points="360,900 370,905 380,910 390,915 400,918" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Section: GAUGE / RISK METER -->
  <text x="40" y="960" class="section-title">GAUGE</text>
  <rect x="40" y="980" width="200" height="120" rx="12" fill="#FFFFFF" filter="url(#chart-shadow)"/>
  <path d="M80,1080 A60,60 0 0,1 200,1080" fill="none" stroke="#E5E7EB" stroke-width="12" stroke-linecap="round"/>
  <path d="M80,1080 A60,60 0 0,1 160,1030" fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round"/>
  <path d="M160,1030 A60,60 0 0,1 180,1060" fill="none" stroke="#F97316" stroke-width="12" stroke-linecap="round"/>
  <text x="140" y="1075" font-family="IBM Plex Sans, sans-serif" font-size="20px" font-weight="600" fill="#111827" text-anchor="middle">72</text>
  <text x="140" y="1090" font-family="Inter, sans-serif" font-size="11px" fill="#6B7280" text-anchor="middle">Risk Score</text>
  
  <!-- Section: CHART LEGEND -->
  <text x="300" y="860" class="section-title">LEGEND</text>
  <rect x="300" y="880" width="200" height="80" rx="8" fill="#FFFFFF"/>
  <circle cx="320" cy="904" r="4" fill="#3B82F6"/>
  <text x="332" y="908" class="label">Stocks</text>
  <circle cx="320" cy="924" r="4" fill="#10B981"/>
  <text x="332" y="928" class="label">Bonds</text>
  <circle cx="320" cy="944" r="4" fill="#F97316"/>
  <text x="332" y="948" class="label">Crypto</text>
  
  <!-- Rules -->
  <text x="500" y="860" class="section-title">CHART RULES</text>
  <text x="500" y="890" class="label">• Line/Area: financial data over time</text>
  <text x="500" y="910" class="label">• Bar: categorical comparisons</text>
  <text x="500" y="930" class="label">• Donut: allocation breakdowns</text>
  <text x="500" y="950" class="label">• Sparkline: inline trend indicators</text>
  <text x="500" y="970" class="label">• Gauge: single metric ranges</text>
  <text x="500" y="990" class="label">• Colors: blue (primary), green (gain)</text>
  <text x="500" y="1010" class="label">• Colors: red (loss), orange (warning)</text>
  <text x="500" y="1030" class="label">• Grid: gray.100 dashed, minimal</text>
  <text x="500" y="1050" class="label">• Axes: gray.400, 11px Inter</text>
  <text x="500" y="1070" class="label">• Data points: 4px circles</text>
  <text x="500" y="1090" class="label">• Hover: show tooltip with value</text>
  
  <defs>
    <filter id="chart-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>
</svg>
