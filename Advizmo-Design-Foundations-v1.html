<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Foundations — Advizmo Design Language</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --text-primary: #111827;
      --text-secondary: #4B5563;
      --text-tertiary: #6B7280;
      --bg-page: #F9FAFB;
      --bg-surface: #FFFFFF;
      --bg-subtle: #F3F4F6;
      --border: #E5E7EB;
      --blue-600: #2563EB;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.6;
    }
    .header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header a { color: var(--blue-600); text-decoration: none; font-size: 14px; }
    .header a:hover { text-decoration: underline; }
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
      background: var(--bg-surface);
      min-height: calc(100vh - 60px);
    }
    #markdown { white-space: pre-wrap; }
    #markdown h1 { font-size: 32px; font-weight: 700; margin: 32px 0 16px; color: var(--text-primary); }
    #markdown h2 { font-size: 24px; font-weight: 600; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--bg-subtle); color: var(--text-primary); }
    #markdown h3 { font-size: 20px; font-weight: 600; margin: 24px 0 12px; color: var(--text-primary); }
    #markdown h4 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; color: var(--text-primary); }
    #markdown p { margin-bottom: 12px; color: var(--text-secondary); }
    #markdown ul, #markdown ol { margin-left: 24px; margin-bottom: 16px; }
    #markdown li { margin-bottom: 8px; color: var(--text-secondary); }
    #markdown table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    #markdown th, #markdown td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    #markdown th { background: var(--bg-subtle); font-weight: 600; font-size: 14px; }
    #markdown td { font-size: 14px; }
    #markdown code { background: var(--bg-subtle); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; }
    #markdown pre { background: var(--bg-subtle); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; }
    #markdown pre code { background: none; padding: 0; }
    #markdown blockquote { border-left: 4px solid var(--blue-600); padding-left: 16px; margin: 16px 0; color: var(--text-tertiary); }
    #markdown hr { border: none; border-top: 2px solid var(--bg-subtle); margin: 32px 0; }
    #markdown strong { font-weight: 600; color: var(--text-primary); }
    #markdown a { color: var(--blue-600); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1>Design Foundations</h1>
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
  <div class="content">
    <div id="markdown"></div>
  </div>
  <script>
    fetch('Advizmo-Design-Foundations-v1.md')
      .then(response => response.text())
      .then(md => {
        document.getElementById('markdown').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('markdown').innerHTML = '<p>Error loading document.</p>';
      });
  </script>
</body>
</html>
